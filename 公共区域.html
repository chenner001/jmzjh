        }

            padding: 0;
            margin: 0;
        }

            max-width: 1320px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: none;
            border: none;
        }

        .top-banner {
            background: linear-gradient(95deg, #0b3b4f 0%, #1a5e6e 100%);
            width: 100%;
            padding: 1rem 2rem;
            border-bottom: 1px solid #0e4a5e;
        }

        .banner-content {
            max-width: 1320px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .banner-left {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.3px;
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.8rem;
            border-left: 3px solid #bcddcc;
        }

        .banner-right {
            font-size: 0.8rem;
            color: #d9ece6;
            font-family: monospace;
        }

        .dashboard {
            padding: 1.8rem 2rem 2rem 2rem;
            background: #ffffff;
        }

        .info-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 0.8rem;
        }

        .time-display {
            font-family: monospace;
            font-size: 0.85rem;
            color: #4a6c7c;
            background: #f7fafc;
            padding: 0.3rem 0.9rem;
            border: 1px solid #e2eaf0;
        }

        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
            gap: 0.2rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.7rem 1.8rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #587b8c;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            color: #0c6b5e;
            border-bottom-color: #0c6b5e;
        }

        .tab-btn:hover:not(.active) {
            color: #1a5f6e;
            background-color: #fafdff;
        }

        .tab-pane {
            display: none;
            animation: fade 0.2s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .list-item {
            border-bottom: 1px solid #ecf1f5;
            background: #ffffff;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0.5rem 1rem 0;
            cursor: pointer;
            background: #ffffff;
            transition: background 0.15s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .item-header:hover {
            background-color: #fafcfe;
        }

        .item-title {
            font-weight: 600;
            color: #1c5a66;
            letter-spacing: -0.2px;
        }

        .item-meta {
            font-size: 0.8rem;
            color: #819eae;
        }

        .expand-icon {
            font-family: monospace;
            font-size: 1rem;
            color: #8dabbc;
            font-weight: 500;
        }

        .item-detail {
            display: none;
            padding: 0.2rem 0.5rem 1.2rem 0;
            border-top: 1px dashed #eef3f7;
            background: #ffffff;
            font-size: 0.9rem;
            color: #2c4958;
            line-height: 1.6;
        }

        .item-detail.active {
            display: block;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }

        .detail-table th,
        .detail-table td {
            border-bottom: 1px solid #eef2f6;
            padding: 0.5rem 0.2rem;
            text-align: left;
            font-size: 0.85rem;
        }

        .detail-table th {
            font-weight: 600;
            color: #2e7a8c;
            width: 36%;
        }

        .total-highlight {
            font-weight: 700;
            color: #1c7c6b;
        }

        .progress-step {
            margin: 0.5rem 0;
            padding-left: 1rem;
            border-left: 2px solid #cde0e8;
        }

        .step-done {
            color: #1f826b;
        }

        .step-current {
            font-weight: 600;
            color: #1b6273;
        }

        .stat-summary {
            background: #f8fbfc;
            padding: 0.7rem 1rem;
            margin-bottom: 1.2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            border-left: 3px solid #2d828e;
            font-size: 0.8rem;
            color: #386d7a;
        }

        .stat-item {
            font-weight: 500;
        }

        .stat-number {
            font-weight: 700;
            color: #226f7a;
            margin-left: 0.3rem;
        }

        .message-board {
            margin-top: 0.2rem;

        }

        .message-item {
            padding: 1rem 0;
            border-bottom: 1px solid #eef2f7;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-header {

            justify-content: space-between;
            align-items: baseline;
            font-size: 0.8rem;
            color: #678f9c;
        }

            font-weight: 600;
            color: #1f6575;
        }

        .message-dept {
            background: #ecf3f6;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;

            font-family: monospace;
            font-size: 0.7rem;
        }

        .message-content {
            font-size: 0.9rem;
            color: #2c4a57;
            line-height: 1.45;
            padding-right: 0.5rem;
        }

            text-align: center;
            font-size: 0.7rem;
            color: #90aebb;
            padding: 1.2rem;
            border-top: 1px solid #e9f0f3;
            background: #ffffff;
        }

            .top-banner {
                padding: 0.7rem 1rem;
            }
            .dashboard {

            }
            .tab-btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .item-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .message-header {
                flex-direction: column;
                gap: 0.3rem;
            }
        }
    </style>
</head>

    </div>

    // ---------- 辅助渲染函数 ----------
    function renderSalaryList() {
        const container = document.getElementById('salaryList');
        if(!container) return;
        container.innerHTML = '';
        salaryData.forEach(emp => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div class="item-header" data-id="${emp.id}" data-type="salary">
                    <span class="item-title">${emp.name} · ${emp.dept}</span>
                    <span class="item-meta">实发: ¥ ${emp.netPay} | 2026年03月</span>
                    <span class="expand-icon">[ + ]</span>
                </div>
                <div class="item-detail" id="salary-detail-${emp.id}"></div>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('#salaryList .item-header').forEach(header => {
            header.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = header.getAttribute('data-id');
                toggleDetail(`salary-detail-${id}`, header);
                const detailDiv = document.getElementById(`salary-detail-${id}`);
                if(detailDiv && detailDiv.innerHTML === '') {
                    const emp = salaryData.find(s => s.id == id);
                    if(emp) detailDiv.innerHTML = generateSalaryDetail(emp);
                }
            });
        });
        const totalNet = salaryData.reduce((sum, e) => sum + parseFloat(e.netPay), 0);
        const statsDiv = document.getElementById('salaryStats');
        if(statsDiv) statsDiv.innerHTML = `<span class="stat-item">本月薪酬总实发: ¥${totalNet.toFixed(2)}</span><span class="stat-item">在职人数: 42</span>`;
    }

    function generateSalaryDetail(emp) {
        return `<table class="detail-table">
            <tr><th>基本工资</th><td>¥ ${emp.basic}</td></tr>
            <tr><th>绩效奖金</th><td>¥ ${emp.performance}</td></tr>
            <tr><th>交通补贴</th><td>¥ ${emp.transport}</td></tr>
            <tr><th>餐补</th><td>¥ ${emp.meal}</td></tr>
            <tr><th>应发合计</th><td class="total-highlight">¥ ${emp.totalGross}</td></tr>
            <tr><th>社保个人部分</th><td>¥ ${emp.socialSecurity}</td></tr>
            <tr><th>公积金个人部分</th><td>¥ ${emp.housingFund}</td></tr>
            <tr><th>个人所得税</th><td>¥ ${emp.tax}</td></tr>
            <tr><th>实发工资</th><td class="total-highlight">¥ ${emp.netPay}</td></tr>
           </table><div style="margin-top:0.4rem; font-size:0.7rem;">发放日期: 2026年3月31日</div>`;
    }

            div.className = 'list-item';

            container.appendChild(div);
        });
        document.querySelectorAll('#expenseList .item-header').forEach(header => {

                    const exp = expenseData.find(e => e.id == id);
                    if(exp) detailDiv.innerHTML = generateExpenseDetail(exp);
                }
            });
        });
        const pending = expenseData.filter(e => e.status.includes("审核中") || e.status.includes("待打款") || e.status.includes("部门审批中")).length;
        document.getElementById('pendingExpenseCount').innerText = pending;
    }

    function generateExpenseDetail(exp) {
        let stepsHtml = '';
        exp.steps.forEach(step => {
            let statusClass = '', statusText = '';
            if(step.status === 'completed') { statusClass = 'step-done'; statusText = '✓ 已完成'; }
            else if(step.status === 'current') { statusClass = 'step-current'; statusText = '● 进行中'; }
            else { statusText = '○ 待处理'; }
            stepsHtml += `<div class="progress-step"><span class="${statusClass}">${step.name}</span> (${step.time}) ${statusText}</div>`;
        });
        return `<div><strong>申请详情：</strong> ${exp.detail}</div><div style="margin-top:0.8rem;"><strong>审批流程：</strong></div>${stepsHtml}<div style="margin-top:0.5rem;">提交日期: ${exp.date}</div>`;
    }

        const container = document.getElementById('trainingList');
        if(!container) return;
        container.innerHTML = '';
        trainingData.forEach(item => {

                }

        });
        document.getElementById('trainingCount').innerText = trainingData.length;
    }

    function renderMessagesOnly() {
        const container = document.getElementById('messageListContainer');
        if(!container) return;
        if(messagesData.length === 0) {
            container.innerHTML = '<div style="padding:1rem 0; color:#8da5b2;">暂无留言</div>';
            return;
        }
        container.innerHTML = '';
        [...messagesData].reverse().forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item';
            msgDiv.innerHTML = `
                <div class="message-header">
                    <div><span class="message-author">${escapeHtml(msg.name)}</span>  <span class="message-dept">${escapeHtml(msg.dept)}</span></div>
                    <div class="message-time">${msg.timestamp}</div>
                </div>
                <div class="message-content">${escapeHtml(msg.content)}</div>
            `;
            container.appendChild(msgDiv);
        });
        document.getElementById('messageCount').innerText = messagesData.length;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function toggleDetail(detailId, headerElement) {
        const detailDiv = document.getElementById(detailId);
        if(!detailDiv) return;
        const expandIcon = headerElement.querySelector('.expand-icon');
        if(detailDiv.classList.contains('active')) {
            detailDiv.classList.remove('active');
            if(expandIcon) expandIcon.innerHTML = '[ + ]';
        } else {
            detailDiv.classList.add('active');
            if(expandIcon) expandIcon.innerHTML = '[ - ]';
        }
    }

    function initTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        const panels = {
            salary: document.getElementById('salaryPanel'),
            announce: document.getElementById('announcePanel'),
            expense: document.getElementById('expensePanel'),
            training: document.getElementById('trainingPanel'),
            message: document.getElementById('messagePanel')
        };
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                Object.values(panels).forEach(p => p.classList.remove('active'));
                tabs.forEach(b => b.classList.remove('active'));
                panels[tabId].classList.add('active');
                btn.classList.add('active');
                if(tabId === 'message') renderMessagesOnly();
            });
        });
    }

    function updateDateTime() {
        const now = new Date();
        const dateStr = now.toLocaleString('zh-CN', {hour12: false});
        const timeElem = document.getElementById('currentDateTime');
        if(timeElem) timeElem.innerText = dateStr;
    }

    function init() {
        renderSalaryList();
        renderAnnounceList();
        renderExpenseList();
        renderTrainingList();
        renderMessagesOnly();
        initTabs();
        updateDateTime();
        setInterval(updateDateTime, 60000);
    }

    init();
